<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4Solutions | Строительная компания</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #c5a059; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #000; color: #fff; line-height: 1.4; }
        .header { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 90%; background: rgba(0,0,0,0.9); border-radius: 50px; padding: 12px 30px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; border: 1px solid #333; backdrop-filter: blur(10px); }
        .logo h1 { font-size: 1.4rem; font-weight: 900; letter-spacing: 2px; }
        .icons { display: flex; gap: 15px; }
        .icons a { width: 45px; height: 48px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; text-decoration: none; font-size: 1.2rem; cursor: pointer; }
        .hero { height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?w=1600') center/cover; }
        .hero h1 { font-size: clamp(2rem, 6vw, 4rem); font-weight: 900; text-transform: uppercase; max-width: 900px; margin-bottom: 20px; }
        .btn { padding: 18px 45px; border-radius: 40px; text-decoration: none; font-weight: 700; text-transform: uppercase; transition: 0.3s; cursor: pointer; display: inline-block; }
        .btn-white { background: #fff; color: #000; }
        .btn-outline { border: 2px solid #fff; color: #fff; }
        .special { padding: 100px 5%; background: #0a0a0a; border-radius: 50px 50px 0 0; margin-top: -50px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; align-items: center; max-width: 1200px; margin: 0 auto; }
        .gallery { padding: 100px 5%; display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; }
        .gallery img { width: 100%; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo"><h1>4 РЕШЕНИЯ</h1></div>
        <div class="icons">
            <a href="#"><i class="fab fa-telegram-plane"></i></a>
            <a href="#"><i class="fas fa-phone"></i></a>
            <a href="#"><i class="fas fa-bars"></i></a>
        </div>
    </header>
    <section class="hero">
        <div class="hero-content">
            <h1>Территория стиля и минимализма для дома и бизнеса</h1>
            <div style="margin-top: 40px;">
                <a href="#projects" class="btn btn-white">Работы</a>
                <a href="#" class="btn btn-outline">Заявка</a>
            </div>
        </div>
    </section>
    <section class="special">
        <div class="grid">
            <div>
                <h2 style="color:var(--accent); font-size: 3rem; margin-bottom: 20px;">БЫСТРЫЙ СТАРТ</h2>
                <p style="font-size: 1.5rem; margin-bottom: 20px;">Черновая отделка «под ключ»</p>
                <div style="font-size: 2.5rem; font-weight: 900; margin-bottom: 30px;">13 500 ₽/м²</div>
            </div>
            <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=800" style="width:100%; border-radius: 30px;">
        </div>
    </section>
    <section id="projects" class="gallery">
        <img src="https://images.unsplash.com/photo-1616486341353-37521d113470?w=800">
        <img src="https://images.unsplash.com/photo-1616137422495-1e99c51207f7?w=800">
    </section>
</body>
</html>
